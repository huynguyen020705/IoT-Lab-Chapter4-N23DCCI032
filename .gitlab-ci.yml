stages:
  - lint
  - test
  - verify

flake8-lint:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install flake8
    - echo "--- Lint BT1 ---"
    - flake8 BT1_QEMU_SystemMonitor/ --max-line-length=120 --show-source
    - echo "--- Lint BT2 ---"
    - flake8 BT2_QEMU_SensorSim/ --max-line-length=120 --show-source

test-sensor-sim:
  stage: test
  image: python:3.11-slim
  script:
    - pip install psutil
    - echo "--- Test sensor_sim.py ---"
    - cd BT2_QEMU_SensorSim && python sensor_sim.py

check-structure:
  stage: verify
  image: alpine:latest
  script:
    - echo "--- Kiểm tra cấu trúc thư mục ---"
    - test -f BT1_QEMU_SystemMonitor/system_monitor.py
    - test -f BT2_QEMU_SensorSim/sensor_sim.py
    - test -f BT2_QEMU_SensorSim/sensor_visualize.py
    - test -f README.md
    - test -f .github/workflows/ci.yml
    - test -f .gitlab-ci.yml
    - echo "Structure OK"